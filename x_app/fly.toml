# fly.toml — TAITAN PRO X DM PWA
app = "taitan-pro-x-dm"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  X_APP_DB_PATH = "/data/data.sqlite"

[[mounts]]
  source = "x_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
