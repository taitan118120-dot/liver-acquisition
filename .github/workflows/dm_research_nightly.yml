name: DM夜間リサーチ

# Mac launchd 経由のローカル実行（com.taitan.dm-research / com.taitan.dm-research-x）が
# 一次ルート。Mac がオフ等で launchd が動かなかった場合の保険として GitHub Actions も残す。
#
# IG 側: Fly NRT IP が IG にレート制限されるため Mac のみで実行（このワークフローでは無し）。
# X  側: Cookie 経由ルートも main route が GraphQL なので、Bearer Token あれば
#        Fly の /api/research でも動く。XDM_BEARER_TOKEN secrets が無ければスキップ。
on:
  schedule:
    - cron: '0 18 * * *'   # JST 03:00
  workflow_dispatch:        # 手動実行も可

jobs:
  x:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true   # Bearer Token 未設定時は失敗するが他は止めない
    steps:
      - name: ログイン (x_app)
        env:
          PW: ${{ secrets.XDM_APP_PASSWORD }}
          BEARER: ${{ secrets.XDM_BEARER_TOKEN }}
        run: |
          if [ -z "$PW" ] || [ -z "$BEARER" ]; then
            echo "XDM_APP_PASSWORD or XDM_BEARER_TOKEN 未設定。スキップ（Mac launchd が一次ルート）"
            exit 78   # neutral exit
          fi
          curl -sS -X POST https://taitan-pro-x-dm.fly.dev/login \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"$PW\"}" \
            -c /tmp/x_cookies.txt -o /tmp/x_login.json
          cat /tmp/x_login.json
          grep -q '"ok": *true' /tmp/x_login.json

      - name: リサーチ実行（Bearer Token 経路）
        env:
          BEARER: ${{ secrets.XDM_BEARER_TOKEN }}
        run: |
          [ -z "$BEARER" ] && exit 78
          curl -sS -X POST https://taitan-pro-x-dm.fly.dev/api/research \
            -H "Content-Type: application/json" \
            -b /tmp/x_cookies.txt \
            -d '{"target_types":["beginner","existing_liver","agency"],"per_query":20}' \
            -o /tmp/x_research.json
          cat /tmp/x_research.json
          # XAuthError なら error フィールドが返る → ジョブは続行
