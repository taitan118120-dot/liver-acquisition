name: エラー自動通知

# NOTE: 以前は anthropics/claude-code-action@v1 による自動修復を行っていたが、
# Claude Code GitHub App (https://github.com/apps/claude) が未インストールのため
# 401 Unauthorized で毎回失敗していた。
# 依存ゼロで確実に動く Issue 通知に差し替え済み。
# 自動修復を復活させたい場合は上記 GitHub App をインストールした上で
# git history から旧設定を復元すること。

on:
  workflow_run:
    workflows:
      - 週次分析
      - リード検索
      - 投稿自動進化
      - 自動フォロー
      - リスト自動追加
      - 自動投稿
      - Instagram自動投稿
      - Instagramトークン自動更新
      - Note記事 自動投稿
      - Note記事 一括更新
      - 誤フォロー除去(ワンショット)
    types: [completed]

jobs:
  notify-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      actions: read
    steps:
      - name: Create or update issue on workflow failure
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const workflowName = run.name;
            const runId = run.id;
            const branch = run.head_branch || 'main';
            const url = run.html_url;
            const title = `ワークフロー失敗: ${workflowName}`;

            // 同じワークフローの未クローズIssueを探してスパム防止
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const match = existing.find(i => i.title === title);

            const body = [
              '## ワークフロー失敗通知',
              '',
              `- **ワークフロー**: \`${workflowName}\``,
              `- **ブランチ**: \`${branch}\``,
              `- **Run ID**: \`${runId}\``,
              `- **URL**: ${url}`,
              '',
              '## 原因確認コマンド',
              '```bash',
              `gh run view ${runId} --log-failed`,
              '```',
              '',
              '---',
              '_このIssueは `.github/workflows/auto_fix.yml` により自動生成されました。_',
            ].join('\n');

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `再発: [Run #${runId}](${url}) がブランチ \`${branch}\` で失敗しました。`,
              });
              core.info(`Commented on existing issue #${match.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
              });
              core.info(`Created issue #${created.number}`);
            }
