name: Instagram自動投稿

on:
  schedule:
    # JST 7:30, 20:00（UTCで-9時間）1日2回
    - cron: '30 22 * * *'   # JST 7:30
    - cron: '0 11 * * *'    # JST 20:00
  workflow_dispatch:  # 手動実行も可能
    inputs:
      source:
        description: 'コンテンツソース'
        type: choice
        options:
          - auto
          - blog
          - twitter
        default: auto
      dry_run:
        description: 'テスト実行（投稿しない）'
        type: boolean
        default: false

# 同時実行を防止（重複投稿・git競合を回避）
concurrency:
  group: instagram-post
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  instagram-post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install requests google-genai Pillow

      - name: 最新の投稿データを取得
        run: git pull --rebase origin main || true

      - name: Instagram投稿実行（リトライ付き）
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Working directory: $(pwd)"
          SOURCE="${{ inputs.source || 'auto' }}"
          export PYTHONPATH="${{ github.workspace }}:${{ github.workspace }}/instagram"

          # ワークフローレベルリトライ（Gemini 503対策: 3分間隔で最大3回）
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== 実行試行 $attempt/$MAX_ATTEMPTS ==="
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              python instagram/ig_scheduler.py --generate --source "$SOURCE" --test && exit 0
            else
              python instagram/ig_scheduler.py --generate --source "$SOURCE" && exit 0
            fi
            EXIT_CODE=$?
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "[WORKFLOW RETRY] 失敗(exit=$EXIT_CODE)、180秒後にリトライ..."
              sleep 180
            fi
          done
          echo "[ERROR] ${MAX_ATTEMPTS}回の試行がすべて失敗"
          exit 1

      - name: 投稿データを保存
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true
          git add data/ instagram/ig_posts.json instagram/images/ || true
          git diff --staged --quiet || git commit -m "Instagram投稿ログ更新"
          git push origin main || echo "[WARNING] git push失敗 - 次回実行で同期されます"
