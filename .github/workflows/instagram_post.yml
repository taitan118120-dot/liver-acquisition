name: Instagram自動投稿

on:
  schedule:
    # JST 7:30, 20:00（UTCで-9時間）1日2回
    - cron: '30 22 * * *'   # JST 7:30
    - cron: '0 11 * * *'    # JST 20:00
  workflow_dispatch:  # 手動実行も可能
    inputs:
      source:
        description: 'コンテンツソース'
        type: choice
        options:
          - auto
          - blog
          - twitter
        default: auto
      dry_run:
        description: 'テスト実行（投稿しない）'
        type: boolean
        default: false

# 同時実行を防止（重複投稿・git競合を回避）
concurrency:
  group: instagram-post
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  instagram-post:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # 最終セーフティ: 個別ステップが失敗してもjob全体は成功扱い
    # (各ステップ内でも set +e を使うが、job レベルで二重に保護)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # main への push を可能にするため 全履歴を取得
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        # 一時的なPyPI障害でも赤くしないため set +e
        shell: bash
        run: |
          set +e
          pip install requests google-genai Pillow
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            echo "::warning::pip install失敗 exit=$EXIT - リトライ"
            sleep 10
            pip install requests google-genai Pillow
          fi
          # 失敗しても投稿は不可なのでここで exit 0 して後続ステップで警告を出す
          exit 0

      - name: 最新の投稿データを取得
        shell: bash
        run: |
          set +e
          git pull --rebase origin main
          exit 0

      - name: Instagram投稿実行（多層防御）
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set +e  # 失敗でもワークフローを赤にしない（最終セーフティ層）
          echo "Working directory: $(pwd)"
          SOURCE="${{ inputs.source || 'auto' }}"
          export PYTHONPATH="${{ github.workspace }}:${{ github.workspace }}/instagram"

          # Pythonレベルの多層防御: Content-Type検証/catboxフォールバック/GitHub raw/
          # 永続エラー時の次候補自動試行/exit 0+STEP_SUMMARY警告
          # ワークフロー側では Gemini 503 等の一時障害対策の外側リトライのみ行う
          MAX_ATTEMPTS=2
          FINAL_EXIT=0
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== 実行試行 $attempt/$MAX_ATTEMPTS ==="
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              python instagram/ig_scheduler.py --generate --source "$SOURCE" --test
            else
              python instagram/ig_scheduler.py --generate --source "$SOURCE"
            fi
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              FINAL_EXIT=0
              break
            fi
            FINAL_EXIT=$EXIT_CODE
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "[WORKFLOW RETRY] 失敗(exit=$EXIT_CODE)、180秒後にリトライ..."
              sleep 180
            fi
          done

          # 最終セーフティ: どんなエラーでもワークフローは必ず成功扱い
          # ユーザー通知は Step Summary 経由で行われる
          if [ $FINAL_EXIT -ne 0 ]; then
            echo "::warning::Instagram投稿は失敗しましたが、Pythonレベルの多層防御で処理済みです。"
            echo "## ⚠️ 投稿スクリプトが非ゼロ終了" >> $GITHUB_STEP_SUMMARY
            echo "exit_code=$FINAL_EXIT。詳細は上のログを確認してください。" >> $GITHUB_STEP_SUMMARY
          fi
          exit 0

      - name: 投稿データを保存
        if: always()
        shell: bash
        run: |
          set +e  # git操作失敗でも絶対に赤くしない
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add data/ instagram/ig_posts.json instagram/images/
          # staged に変更があれば commit、無ければスキップ
          if ! git diff --staged --quiet; then
            git commit -m "Instagram投稿ログ更新"
            # push失敗時は pull --rebase で再試行
            for attempt in 1 2 3; do
              if git push origin main; then
                echo "[GIT] push成功 (attempt=$attempt)"
                break
              fi
              echo "[WARN] git push失敗 attempt=$attempt - rebase してリトライ"
              git pull --rebase origin main
              sleep 3
            done
          else
            echo "[GIT] staged変更なし、skip"
          fi
          exit 0
