name: Note記事 一括更新

on:
  workflow_dispatch:
    inputs:
      articles:
        description: '更新する記事番号（カンマ区切り、空欄で全記事）'
        required: false
        default: ''
      dry_run:
        description: 'Dry run（更新せず確認のみ）'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: pip install requests

      - name: "全記事を更新"
        if: github.event.inputs.articles == '' && github.event.inputs.dry_run != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: python note_auto_poster.py --update-all

      - name: "指定記事を更新"
        if: github.event.inputs.articles != '' && github.event.inputs.dry_run != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: python note_auto_poster.py --update ${{ github.event.inputs.articles }}

      - name: "Dry run（全記事）"
        if: github.event.inputs.articles == '' && github.event.inputs.dry_run == 'true'
        run: python note_auto_poster.py --update-all --dry-run

      - name: ログを保存
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase || true
          git add data/ || true
          git diff --staged --quiet || git commit -m "Note記事更新ログ $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M')"
          git push || true
