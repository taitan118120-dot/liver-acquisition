name: 自動フォロー (停止中)

# 2026-04-15: 自動フォロー停止。
# 理由: フォローバック率ほぼ0。アカウント(@taitan_LIVER)のインプ/エンゲージが極小
#       状態で follow-only 戦略は効果が出ない。コンテンツ強化優先に切替。
# 再開したい場合: 下の schedule のコメントを外す。
on:
  # schedule:
  #   - cron: '0 0 * * *'   # JST 9:00
  #   - cron: '0 6 * * *'   # JST 15:00
  workflow_dispatch:  # 手動実行のみ残す（テスト用）

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  follow:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install tweepy
      - name: フォロー実行
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python cloud_follow.py
      - name: ログ保存
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "フォローログ更新"
          git push || true
