name: Note記事 自動投稿

on:
  schedule:
    # 1日3回投稿（JST 8:03, 12:33, 20:07）
    - cron: '3 23 * * *'     # JST 08:03（UTC 23:03 前日）
    - cron: '33 3 * * *'     # JST 12:33
    - cron: '7 11 * * *'     # JST 20:07
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（投稿せず確認のみ）'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-article:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: pip install requests

      - name: "Note.comに投稿"
        if: github.event.inputs.dry_run != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: python note_auto_poster.py --post-latest

      - name: ログを保存
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase || true
          git add data/ || true
          git diff --staged --quiet || git commit -m "Note自動投稿ログ $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M')"
          git push || true
