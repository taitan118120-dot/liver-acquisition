name: Note記事 自動投稿

on:
  schedule:
    # 1日3回投稿（JST 8:03, 12:33, 20:07）
    - cron: '3 23 * * *'     # JST 08:03（UTC 23:03 前日）
    - cron: '33 3 * * *'     # JST 12:33
    - cron: '7 11 * * *'     # JST 20:07
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（投稿せず生成のみ）'
        required: false
        default: 'false'
      count:
        description: '生成記事数'
        required: false
        default: '1'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: |
          pip install google-genai playwright
          playwright install chromium
          playwright install-deps chromium

      - name: "記事生成（Gemini）"
        id: generate
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python note_article_generator.py --generate -n ${{ github.event.inputs.count || '1' }}

      - name: "Note.comに投稿"
        if: github.event.inputs.dry_run != 'true'
        env:
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
        run: |
          python note_auto_poster.py --post-latest

      - name: "生成失敗時はエラー報告"
        if: steps.generate.outcome == 'failure'
        run: |
          echo "::warning::記事生成に失敗しました（Gemini API障害の可能性）。未投稿記事があれば投稿を試みました。"

      - name: "デバッグ: スクリーンショット保存"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: note-debug-screenshots
          path: data/note_screenshots/
          retention-days: 3
          if-no-files-found: ignore

      - name: ログ・記事を保存
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase || true
          git add blog/articles_note/ data/ || true
          git diff --staged --quiet || git commit -m "Note記事自動投稿 $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M')"
          git push || true
