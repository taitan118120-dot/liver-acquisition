name: Instagramトークン自動更新

on:
  schedule:
    # 毎日 9:00 JST（UTC 0:00）に実行 — 期限切れ防止
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能
    inputs:
      force:
        description: '強制更新（期限に関係なく更新）'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: gh CLI 認証
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: echo "GH_TOKEN=$GH_TOKEN" >> $GITHUB_ENV

      - name: トークン更新
        working-directory: instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python ig_token_refresh.py --force-refresh
          else
            python ig_token_refresh.py --refresh
          fi

      - name: トークン情報を保存
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add instagram/token_info.json || true
          git diff --staged --quiet || git commit -m "Instagramトークン情報更新"
          git push || true
